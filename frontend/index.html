<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-tab.png?v=2" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon-96.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Karix Computers | PC Gaming & Service Oradea</title>
    <meta name="description" content="Magazin de calculatoare și service profesional în Oradea. Sisteme gaming high-end și reparații hardware." />

    <meta name="theme-color" content="#0b1020" />

    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #0b1020; /* Fundalul închis al site-ului */
      }
      .k-loader-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
      }
      .k-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(99, 102, 241, 0.1); /* Indigo transparent */
        border-top-color: #6366f1; /* Indigo aprins */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="k-loader-container">
        <div class="k-spinner"></div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
